<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 플랫폼 용어사전 | 동국제강 정보기획팀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<style>
:root{
  --bg:#f7f8fc;
  --bg2:#ffffff;
  --bg3:#f0f2f8;
  --bg4:#e8eaf6;
  --border:#e0e3ee;
  --border2:#c8ccde;
  --text:#191f28;
  --text2:#4e5968;
  --text3:#8b95a1;
  --accent:#1a6cff;
  --accent-bg:#eef3ff;
  --accent-hover:#0052d9;
  --green:#00a86b;
  --green-bg:#e6f7f0;
  --amber:#f59e0b;
  --amber-bg:#fff8e6;
  --red:#e53935;
  --red-bg:#fff0f0;
  --purple:#7c3aed;
  --purple-bg:#f3efff;
  --teal:#0891b2;
  --teal-bg:#e0f7fa;
  --r:12px;
  --r-sm:8px;
  --shadow:0 1px 6px rgba(0,0,0,0.07);
  --shadow-md:0 4px 20px rgba(0,0,0,0.10);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.14);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1.5px solid var(--border);height:64px;display:flex;align-items:center;padding:0 28px;gap:20px;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:grid;place-items:center;font-size:20px;}
.logo-text{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-0.5px;}
.logo-text span{color:var(--accent);}
.search-wrap{flex:1;max-width:520px;position:relative;}
.search-wrap input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:24px;padding:10px 40px 10px 44px;font-size:15px;color:var(--text);font-family:inherit;outline:none;transition:all .2s;}
.search-wrap input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px rgba(26,108,255,0.10);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:17px;}
.search-clear{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:var(--border2);border:none;color:var(--text2);cursor:pointer;font-size:14px;display:none;padding:0;width:20px;height:20px;border-radius:50%;line-height:20px;text-align:center;}
.search-clear.show{display:block;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.stat-badge{font-size:13px;color:var(--text3);background:var(--bg3);padding:5px 12px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;font-weight:500;}
.hdr-btn{padding:8px 14px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:#fff;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.hdr-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.hdr-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.hdr-btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover);}

/* ── LAYOUT ── */
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 64px);}
aside{background:#fff;border-right:1.5px solid var(--border);padding:20px 0;position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;}
aside::-webkit-scrollbar{width:3px;}
aside::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.aside-section{padding:0 14px;margin-bottom:22px;}
.aside-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;padding:0 6px;}
.cat-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 10px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;text-align:left;}
.cat-btn:hover{background:var(--bg3);color:var(--text);}
.cat-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:700;}
.cat-dot{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0;}
.cat-count{font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 7px;border-radius:10px;font-weight:500;}
.cat-btn.active .cat-count{background:rgba(26,108,255,0.12);color:var(--accent);}
.pf-filter{display:flex;flex-wrap:wrap;gap:5px;}
.pf-btn{padding:5px 11px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.pf-btn:hover{border-color:var(--accent);color:var(--accent);}
.pf-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.fav-side-btn{width:100%;padding:9px 10px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text2);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:6px;}
.fav-side-btn:hover{background:var(--bg3);color:var(--amber);}
.fav-side-btn.active{background:var(--amber-bg);color:var(--amber);font-weight:700;}

/* ── MAIN ── */
main{padding:24px 28px;width:100%;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.result-info{font-size:15px;color:var(--text2);}
.result-info strong{color:var(--text);font-weight:700;}
.sort-row{display:flex;gap:6px;}
.sort-btn{padding:6px 13px;border-radius:16px;border:1.5px solid var(--border);background:#fff;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;}
.sort-btn.active{background:var(--text);color:#fff;border-color:var(--text);}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;min-height:0;}
.filter-tag{display:flex;align-items:center;gap:5px;padding:4px 12px;background:var(--accent-bg);border:1px solid rgba(26,108,255,0.2);border-radius:16px;font-size:13px;color:var(--accent);font-weight:500;}
.filter-tag button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;padding:0;line-height:1;}

/* ── CARDS ── */
.card-grid{display:flex;flex-direction:column;gap:10px;width:100%;}
.term-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:18px 20px;cursor:pointer;transition:all .18s;width:100%;position:relative;overflow:hidden;}
.term-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.card-stripe{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:var(--r) 0 0 var(--r);}
.card-content{padding-left:4px;}
.card-top{display:flex;align-items:flex-start;gap:12px;}
.card-names{flex:1;}
.card-kor{font-size:17px;font-weight:700;color:var(--text);margin-bottom:3px;letter-spacing:-0.3px;}
.card-eng{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text3);font-weight:400;}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.fav-icon{background:none;border:none;color:var(--text3);cursor:pointer;font-size:20px;transition:all .15s;padding:0;line-height:1;}
.fav-icon:hover{color:var(--amber);transform:scale(1.1);}
.fav-icon.active{color:var(--amber);}
.new-badge{font-size:10px;font-weight:800;background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;letter-spacing:.04em;}
.cat-tag{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:600;}
.card-short{margin-top:10px;font-size:14px;color:var(--text2);line-height:1.65;}
.card-platforms{margin-top:10px;display:flex;gap:5px;flex-wrap:wrap;}
.plt-badge{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:500;}
mark{background:rgba(26,108,255,0.15);color:var(--accent);border-radius:2px;padding:0 1px;}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:80px 20px;}
.empty-icon{font-size:56px;margin-bottom:16px;}
.empty-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:15px;color:var(--text2);margin-bottom:28px;line-height:1.75;}
.ai-search-btn{padding:13px 28px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 12px rgba(26,108,255,0.3);}
.ai-search-btn:hover{background:var(--accent-hover);transform:translateY(-1px);}
.ai-inline-bar{display:none;align-items:center;justify-content:space-between;background:var(--accent-bg);border:1.5px solid rgba(26,108,255,0.2);border-radius:var(--r-sm);padding:12px 18px;margin-bottom:14px;}
.ai-inline-bar.show{display:flex;}
.ai-inline-text{font-size:14px;color:var(--text2);}
.ai-inline-text strong{color:var(--text);font-weight:700;}
.ai-inline-btn{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s;}
.ai-inline-btn:hover{background:var(--accent-hover);}
.ai-search-btn:hover{background:var(--accent-hover);transform:translateY(-1px);}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;overflow-y:auto;padding:60px 20px 40px;}
.modal-overlay.open{display:block;}
.modal{background:#fff;border-radius:16px;max-width:700px;margin:0 auto;overflow:hidden;box-shadow:var(--shadow-lg);}
.modal-header{padding:24px 28px 18px;border-bottom:1.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.modal-kor{font-size:22px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-0.5px;}
.modal-eng{font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text3);}
.modal-close{background:var(--bg3);border:none;color:var(--text2);font-size:18px;cursor:pointer;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;flex-shrink:0;transition:all .15s;}
.modal-close:hover{background:var(--border2);color:var(--text);}
.modal-body{padding:24px 28px;}
.ms-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:8px;}
.ms-highlight{font-size:16px;color:var(--text);background:var(--accent-bg);border-left:4px solid var(--accent);padding:14px 18px;border-radius:0 var(--r-sm) var(--r-sm) 0;line-height:1.7;font-weight:500;margin-bottom:20px;}
.ms-text{font-size:15px;color:var(--text2);line-height:1.8;margin-bottom:20px;}
.ms-example{font-size:14px;color:var(--text2);background:var(--green-bg);border:1px solid rgba(0,168,107,0.2);padding:13px 16px;border-radius:var(--r-sm);line-height:1.75;margin-bottom:20px;}
.modal-platforms{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.modal-related{display:flex;flex-wrap:wrap;gap:7px;}
.rel-link{padding:6px 14px;border-radius:16px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
.rel-link:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);}
.modal-footer{padding:14px 28px;border-top:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg3);}
.copy-link-btn{padding:7px 16px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:#fff;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.copy-link-btn:hover{border-color:var(--accent);color:var(--accent);}
.added-date{font-size:13px;color:var(--text3);}

/* ── DUPLICATE NOTICE ── */
.dup-notice{background:var(--amber-bg);border:1.5px solid rgba(245,158,11,0.35);border-radius:var(--r-sm);padding:14px 18px;margin-bottom:16px;}
.dup-title{font-size:14px;font-weight:700;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.dup-list{display:flex;flex-direction:column;gap:6px;}
.dup-item{background:#fff;border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;cursor:pointer;transition:all .15s;}
.dup-item:hover{border-color:var(--amber);background:var(--amber-bg);}
.dup-item-kor{font-size:14px;font-weight:700;color:var(--text);}
.dup-item-short{font-size:13px;color:var(--text2);margin-top:2px;}

/* ── AI PANEL ── */
.ai-panel{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);padding:24px;margin-top:16px;display:none;box-shadow:var(--shadow);}
.ai-panel.show{display:block;}
.ai-panel-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.ai-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--purple));border-radius:10px;display:grid;place-items:center;font-size:20px;flex-shrink:0;}
.ai-title{font-size:16px;font-weight:700;color:var(--text);}
.ai-sub{font-size:13px;color:var(--text3);margin-top:1px;}
.ai-loading{font-size:15px;color:var(--text2);padding:10px 0;}
.ai-loading::after{content:'...';animation:dots 1.4s infinite;}
@keyframes dots{0%{content:'...'}33%{content:'....'}66%{content:'.....'}100%{content:'...'}}
.ai-result{background:var(--bg3);border-radius:var(--r-sm);padding:18px;border:1px solid var(--border);}
.ai-field{margin-bottom:14px;}
.ai-field:last-child{margin-bottom:0;}
.ai-field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px;}
.ai-field-value{font-size:14px;color:var(--text2);line-height:1.65;}
.ai-edit-input{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s;resize:none;}
.ai-edit-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,108,255,0.08);}
.ai-edit-select{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-sm);padding:8px 12px;font-size:14px;color:var(--text);font-family:inherit;outline:none;cursor:pointer;}
.ai-edit-select:focus{border-color:var(--accent);}
.ai-field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px;display:flex;align-items:center;gap:4px;}
.edit-hint{font-size:10px;color:var(--accent);font-weight:400;letter-spacing:0;}
.ai-actions{display:flex;gap:8px;margin-top:18px;}
.ai-save-btn{padding:10px 22px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.ai-save-btn:hover{background:#008f5c;}
.ai-dismiss-btn{padding:10px 18px;background:#fff;color:var(--text2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s;}
.ai-dismiss-btn:hover{border-color:var(--red);color:var(--red);}
.plt-checks{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.plt-chk{display:none;}
.plt-lbl{padding:4px 12px;border-radius:12px;border:1.5px solid var(--border);color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;}
.plt-chk:checked + .plt-lbl{background:var(--accent);border-color:var(--accent);color:#fff;}

/* ── ADMIN ── */
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:300;overflow-y:auto;padding:60px 20px;}
.admin-overlay.open{display:block;}
.admin-box{background:#fff;border-radius:16px;max-width:600px;margin:0 auto;padding:32px;box-shadow:var(--shadow-lg);}
.admin-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:6px;letter-spacing:-0.5px;}
.admin-tabs{display:flex;gap:0;margin-bottom:24px;border-bottom:2px solid var(--border);margin-top:16px;}
.admin-tab{padding:10px 18px;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s;}
.admin-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.form-group{margin-bottom:16px;}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);background:#fff;}
.form-textarea{height:80px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-select option{background:#fff;}
.admin-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.btn-primary{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-danger{padding:10px 22px;background:var(--red);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-secondary{padding:10px 18px;background:#fff;color:var(--text2);border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;}
.pw-box{background:var(--bg3);border-radius:var(--r-sm);padding:18px;border:1.5px solid var(--border);margin-bottom:4px;}
.pw-hint{font-size:12px;color:var(--text3);margin-top:6px;}

/* ── DELETE LIST ── */
.del-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto;}
.del-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg3);border-radius:var(--r-sm);border:1px solid var(--border);gap:10px;}
.del-item-info{flex:1;}
.del-item-kor{font-size:14px;font-weight:700;color:var(--text);}
.del-item-cat{font-size:12px;color:var(--text3);margin-top:1px;}
.del-btn{padding:5px 12px;background:var(--red-bg);color:var(--red);border:1px solid rgba(229,57,53,0.25);border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.del-btn:hover{background:var(--red);color:#fff;}
.del-search{width:100%;margin-bottom:12px;}
.pending-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;margin-left:4px;}
.pending-item{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;}
.pending-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pending-item-kor{font-size:14px;font-weight:700;color:var(--text);}
.pending-item-cat{font-size:12px;color:var(--text3);}
.pending-item-short{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5;}
.pending-btns{display:flex;gap:6px;margin-top:8px;}
.approve-btn{padding:5px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.reject-btn{padding:5px 14px;background:var(--red-bg);color:var(--red);border:1px solid rgba(229,57,53,0.25);border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.approve-btn:hover{background:#008f5c;}
.reject-btn:hover{background:var(--red);color:#fff;}
.github-status{font-size:12px;padding:6px 12px;border-radius:var(--r-sm);margin-top:6px;display:inline-block;}
.github-ok{background:var(--green-bg);color:var(--green);}
.github-fail{background:var(--red-bg);color:var(--red);}
.pending-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--red);color:#fff;font-size:10px;font-weight:800;width:18px;height:18px;border-radius:50%;margin-left:4px;}
.pending-item{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;}
.pending-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.pending-item-kor{font-size:14px;font-weight:700;color:var(--text);}
.pending-item-cat{font-size:12px;color:var(--text3);}
.pending-item-short{font-size:13px;color:var(--text2);margin-top:3px;line-height:1.5;}
.pending-btns{display:flex;gap:6px;margin-top:8px;}
.approve-btn{padding:5px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.reject-btn{padding:5px 14px;background:var(--red-bg);color:var(--red);border:1px solid rgba(229,57,53,0.25);border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;}
.approve-btn:hover{background:#008f5c;}
.reject-btn:hover{background:var(--red);color:#fff;}
.github-status{font-size:12px;padding:6px 12px;border-radius:var(--r-sm);margin-top:8px;}
.github-ok{background:var(--green-bg);color:var(--green);}
.github-fail{background:var(--red-bg);color:var(--red);}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--text);color:#fff;border-radius:var(--r-sm);padding:13px 20px;font-size:14px;font-weight:500;z-index:500;transform:translateY(80px);opacity:0;transition:all .3s;pointer-events:none;box-shadow:var(--shadow-lg);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:var(--green);}
.toast.warn{background:var(--amber);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:800px){
  .layout{grid-template-columns:1fr;}
  aside{display:none;}
  main{padding:16px;}
  header{padding:0 16px;gap:10px;}
}

<script>
const ADMIN_PW = 'admin1234';
const PROXY_URL = ''; // Cloudflare Worker URL (선택)

// ─── GitHub 설정 ───────────────────────────────────────
// 아래 두 값을 입력하면 승인 시 db.json이 자동 업데이트됩니다
const GITHUB_TOKEN = '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';        // ← 여기에 Personal Access Token 입력
const GITHUB_REPO  = 'koobongeun/Document'; // 저장소명 (변경 불필요)
const GITHUB_FILE  = 'db.json'; // 파일명 (변경 불필요)
// ────────────────────────────────────────────────────────
const CAT_COLORS={
  '데이터 아키텍처':'#1a6cff','데이터 처리':'#00a86b','데이터 거버넌스':'#f59e0b',
  'AI / ML':'#7c3aed','클라우드 & 인프라':'#e53935','온톨로지 & 지식표현':'#0891b2',
  '시맨틱 & 데이터 표준':'#db2777','신흥 & 트렌드':'#ea580c',
  '플랫폼별 고유 용어':'#64748b','제조 DX':'#9333ea'
};
const PLT_COLORS={AWS:'#f59e0b',GCP:'#4285f4',Snowflake:'#29b5e8',Databricks:'#e7572c'};

let DB=[], filtered=[], activeCategory='전체', activePlatform='전체';
let activeSort='category', searchQuery='', favOnly=false;
let favSet=new Set(JSON.parse(localStorage.getItem('favs')||'[]'));
let adminUnlocked=false, adminTab='add', fuse;
let pendingAdds = JSON.parse(localStorage.getItem('pending_adds')||'[]');
let pendingDels = JSON.parse(localStorage.getItem('pending_dels')||'[]');
async function init(){
  try{
    const r=await fetch('./db.json?v='+Date.now());
    const j=await r.json();
    // approved:'Y'만 화면에 표시, 'N'은 pendingAdds에 보관
    const allTerms=j.terms||[];
    DB=allTerms.filter(t=>t.approved==='Y');
    // pending_adds에 없는 N 항목은 추가
    const existIds=new Set(pendingAdds.map(p=>p.id));
    allTerms.filter(t=>t.approved==='N').forEach(t=>{
      if(!existIds.has(t.id)) pendingAdds.push(t);
    });
    localStorage.setItem('pending_adds',JSON.stringify(pendingAdds));
  }catch(e){DB=[];}
  buildFuse(); buildCatList(); renderAll();
  setTimeout(updatePendingBadge, 100);
}
function buildFuse(){
  fuse=new Fuse(DB,{keys:[{name:'kor',weight:.35},{name:'eng',weight:.3},{name:'short',weight:.2},{name:'detail',weight:.1},{name:'category',weight:.05}],threshold:.35,includeMatches:true,minMatchCharLength:1});
}
function buildCatList(){
  const cats=[...new Set(DB.map(d=>d.category))];
  document.getElementById('cat-list').innerHTML=cats.map(c=>{
    const cnt=DB.filter(d=>d.category===c).length;
    const col=CAT_COLORS[c]||'#888';
    return`<button class="cat-btn" data-cat="${c}" onclick="setCategory('${c}',this)">
      <span style="display:flex;align-items:center"><span class="cat-dot" style="background:${col}"></span>${c}</span>
      <span class="cat-count">${cnt}</span>
    </button>`;
  }).join('');
  document.getElementById('cnt-전체').textContent=DB.length;
  document.getElementById('stat-badge').textContent=`총 ${DB.length}개 용어 | 승인 대기 ${pendingAdds.length}개`;
}

function renderAll(){
  let data=[...DB]; let matchMap=new Map();
  if(searchQuery.trim()){
    const res=fuse.search(searchQuery);
    data=res.map(r=>{matchMap.set(r.item.id,r.matches);return r.item;});
  }
  if(activeCategory!=='전체')data=data.filter(d=>d.category===activeCategory);
  if(activePlatform!=='전체')data=data.filter(d=>(d.platforms||[]).some(p=>p.includes(activePlatform)));
  if(favOnly)data=data.filter(d=>favSet.has(d.id));
  if(activeSort==='kor')data.sort((a,b)=>a.kor.localeCompare(b.kor,'ko'));
  else if(activeSort==='category')data.sort((a,b)=>a.category!==b.category?a.category.localeCompare(b.category,'ko'):a.kor.localeCompare(b.kor,'ko'));
  else if(activeSort==='new')data.sort((a,b)=>(b.added_date||'').localeCompare(a.added_date||''));
  else if(activeSort==='fav')data.sort((a,b)=>favSet.has(b.id)-favSet.has(a.id));
  filtered=data;
  document.getElementById('result-info').innerHTML=`검색 결과 <strong>${data.length}</strong>개 / 전체 ${DB.length}개`;
  const af=document.getElementById('active-filters'); const tags=[];
  if(activeCategory!=='전체')tags.push(`<span class="filter-tag">${activeCategory}<button onclick="setCategory('전체',document.querySelector('[data-cat=전체]'))">×</button></span>`);
  if(activePlatform!=='전체')tags.push(`<span class="filter-tag">${activePlatform}<button onclick="setPlatform('전체',document.querySelector('[data-pf=전체]'))">×</button></span>`);
  if(favOnly)tags.push(`<span class="filter-tag">⭐ 즐겨찾기<button onclick="toggleFavFilter()">×</button></span>`);
  if(searchQuery)tags.push(`<span class="filter-tag">🔍 "${searchQuery}"<button onclick="clearSearch()">×</button></span>`);
  af.innerHTML=tags.join('');
  const grid=document.getElementById('card-grid');
  // AI 인라인 버튼: 검색어가 있으면 결과 유무와 관계없이 항상 표시
  const inlineBar=document.getElementById('ai-inline-bar');
  const inlineQuery=document.getElementById('ai-inline-query');
  if(searchQuery.trim()){
    inlineQuery.textContent=`"${searchQuery}"`;
    inlineBar.classList.add('show');
  } else {
    inlineBar.classList.remove('show');
  }

  if(!data.length){grid.innerHTML='';showEmptyState();}
  else{grid.innerHTML=data.map(t=>renderCard(t,matchMap.get(t.id))).join('');}
}

function renderCard(t,matches){
  const col=CAT_COLORS[t.category]||'#888';
  const isFav=favSet.has(t.id);
  let kor=t.kor,eng=t.eng,sht=t.short;
  if(matches&&searchQuery){matches.forEach(m=>{
    if(m.key==='kor')kor=hl(t.kor,m.indices);
    if(m.key==='eng')eng=hl(t.eng,m.indices);
    if(m.key==='short')sht=hl(t.short,m.indices);
  });}
  const pltBadges=(t.platforms||[]).slice(0,3).map(p=>{
    const k=Object.keys(PLT_COLORS).find(k=>p.includes(k));
    const c=k?PLT_COLORS[k]:'#64748b';
    return`<span class="plt-badge" style="background:${c}18;color:${c};border:1px solid ${c}33">${p}</span>`;
  }).join('');
  return`<div class="term-card" id="card-${t.id}" onclick="openModal('${t.id}')">
    <div class="card-stripe" style="background:${col}"></div>
    <div class="card-content">
      <div class="card-top">
        <div class="card-names"><div class="card-kor">${kor}</div><div class="card-eng">${eng}</div></div>
        <div class="card-right">
          <button class="fav-icon${isFav?' active':''}" onclick="event.stopPropagation();toggleFav('${t.id}',this)">${isFav?'⭐':'☆'}</button>
          ${t.is_new?'<span class="new-badge">NEW</span>':''}
          <span class="cat-tag" style="background:${col}15;color:${col};border:1px solid ${col}35">${t.category}</span>
        </div>
      </div>
      <div class="card-short">${sht}</div>
      <div class="card-platforms">${pltBadges}</div>
    </div>
  </div>`;
}
function hl(text,indices){
  if(!indices||!indices.length)return text;
  let r='',l=0;
  indices.forEach(([s,e])=>{r+=text.slice(l,s)+`<mark>${text.slice(s,e+1)}</mark>`;l=e+1;});
  return r+text.slice(l);
}

function openModal(id){
  const t=DB.find(d=>d.id===id); if(!t)return;
  const col=CAT_COLORS[t.category]||'#888';
  const isFav=favSet.has(id);
  const pltBadges=(t.platforms||[]).map(p=>{
    const k=Object.keys(PLT_COLORS).find(k=>p.includes(k));
    const c=k?PLT_COLORS[k]:'#64748b';
    return`<span class="plt-badge" style="background:${c}18;color:${c};border:1px solid ${c}33;padding:5px 12px;font-size:13px;border-radius:10px">${p}</span>`;
  }).join('');
  const relLinks=(t.related||[]).map(r=>`<button class="rel-link" onclick="searchRelated('${r}')">${r}</button>`).join('');
  document.getElementById('modal').innerHTML=`
    <div class="modal-header">
      <div style="flex:1">
        <div class="modal-kor">${t.kor}</div>
        <div class="modal-eng">${t.eng}</div>
        <div style="margin-top:8px;display:flex;gap:6px;align-items:center">
          <span class="cat-tag" style="background:${col}15;color:${col};border:1px solid ${col}35">${t.category}</span>
          ${t.is_new?'<span class="new-badge">NEW</span>':''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <button class="fav-icon${isFav?' active':''}" id="modal-fav" onclick="toggleFav('${id}',this,true)" style="font-size:22px">${isFav?'⭐':'☆'}</button>
      </div>
    </div>
    <div class="modal-body">
      <div class="ms-label">한 줄 정의</div>
      <div class="ms-highlight">${t.short}</div>
      <div class="ms-label">상세 설명</div>
      <div class="ms-text">${t.detail}</div>
      ${t.mfg_example?`<div class="ms-label">🏭 제조 DX 활용 예시</div><div class="ms-example">${t.mfg_example}</div>`:''}
      ${pltBadges?`<div class="ms-label">주요 플랫폼</div><div class="modal-platforms">${pltBadges}</div>`:''}
      ${relLinks?`<div class="ms-label">관련 용어</div><div class="modal-related">${relLinks}</div>`:''}
    </div>
    <div class="modal-footer">
      <button class="copy-link-btn" onclick="copyLink('${id}')">🔗 링크 복사</button>
      <span class="added-date">추가일: ${t.added_date||'-'}</span>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
  history.pushState(null,'',`#${id}`);
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');history.pushState(null,'',window.location.pathname);}
function searchRelated(term){closeModal();document.getElementById('search-input').value=term;searchQuery=term;document.getElementById('search-clear').classList.add('show');renderAll();}
function copyLink(id){navigator.clipboard.writeText(location.href.split('#')[0]+'#'+id);showToast('링크 복사됨!','success');}

// ── EMPTY & AI ──

  const q=searchQuery;
  document.getElementById('card-grid').innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">🔎</div>
      <div class="empty-title">"${q}"에 해당하는 용어가 없습니다</div>
      <div class="empty-sub">위의 <strong style="color:var(--accent)">용어 자동 정의하기</strong> 버튼을 눌러<br>용어사전에 추가하세요</div>
    </div>`;
}

function runAiSearchFromBar(){
  const query=searchQuery.trim();
  if(!query)return;
  // AI 패널 아래로 스크롤
  document.getElementById('ai-panel').scrollIntoView({behavior:'smooth',block:'start'});
  runAiSearch(query);
}

async function runAiSearch(query){
  const panel=document.getElementById('ai-panel');
  const body=document.getElementById('ai-body');
  document.getElementById('ai-label').textContent=`"${query}" 검색 중...`;
  panel.classList.add('show');
  body.innerHTML=`<div class="ai-loading">Wikipedia·내장 사전에서 정보를 수집하고 있습니다</div>`;

  // 1순위: Anthropic API (PROXY_URL 설정된 경우)
  if(PROXY_URL){
    try{
      const res=await Promise.race([
        fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:buildPrompt(query)}]})}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
      ]);
      const data=await res.json();
      const text=data.content?.find(c=>c.type==='text')?.text||'';
      const m=text.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);
      if(m){renderAiResult(query,JSON.parse(m[0]));return;}
    }catch(e){console.warn('Proxy failed, fallback to Wikipedia');}
  }

  // 2순위: Wikipedia API (무료, CORS 허용)
  try{
    const result = await searchWikipedia(query);
    if(result){renderAiResult(query, result);return;}
  }catch(e){console.warn('Wikipedia failed:', e);}

  // 3순위: 내장 사전 + 로컬 추론
  renderAiResult(query, inferTerm(query));
}

// ── Wikipedia API 검색 ──────────────────────────────
async function searchWikipedia(query){
  // 한국어 검색 시도
  const koResult = await fetchWiki(query, 'ko');
  if(koResult) return koResult;

  // 한국어 실패 시 영어 검색
  const enResult = await fetchWiki(query, 'en');
  if(enResult) return enResult;

  return null;
}

async function fetchWiki(query, lang){
  try{
    const searchUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
    const searchRes = await Promise.race([
      fetch(searchUrl),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
    ]);
    const searchData = await searchRes.json();
    const hits = searchData?.query?.search;
    if(!hits||!hits.length) return null;

    // 가장 관련성 높은 결과의 본문 가져오기
    const title = hits[0].title;
    const contentUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=true&explaintext=true&titles=${encodeURIComponent(title)}&format=json&origin=*`;
    const contentRes = await fetch(contentUrl);
    const contentData = await contentRes.json();
    const pages = contentData?.query?.pages;
    const page = Object.values(pages||{})[0];
    if(!page||!page.extract) return null;

    return parseWikiToTerm(query, title, page.extract, lang);
  }catch(e){return null;}
}

function parseWikiToTerm(query, wikiTitle, extract, lang){
  // 본문에서 첫 단락만 추출 (가장 핵심 정의)
  const paras = extract.split('\n').filter(p=>p.trim().length>30);
  const firstPara = paras[0]||'';
  const secondPara = paras[1]||'';

  // 한 줄 정의: 첫 문장
  const firstSentence = firstPara.split(/[.。]/)[0].trim();
  const shortDef = firstSentence.length>80
    ? firstSentence.slice(0,77)+'...'
    : firstSentence;

  // 상세 설명: 첫~두 번째 단락 합산 (200자 이내)
  const detail = (firstPara+(secondPara?' '+secondPara:'')).slice(0,300);

  // 카테고리 추론
  const base = inferTerm(query);

  // Wikipedia 출처 표시
  const wikiLink = `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(wikiTitle)}`;

  return {
    ...base,
    kor: lang==='ko' ? wikiTitle : base.kor,
    eng: lang==='en' ? wikiTitle : base.eng,
    short: shortDef || base.short,

function inferTerm(q){
  const ql = q.toLowerCase().trim();

  // 1순위: 내장 사전에서 정확 매칭
  if (TERM_DICT[ql]) return TERM_DICT[ql];

  // 2순위: 내장 사전에서 부분 매칭
  const dictKey = Object.keys(TERM_DICT).find(k => ql.includes(k) || k.includes(ql));
  if (dictKey) return TERM_DICT[dictKey];

  // 3순위: 키워드 기반 카테고리 추론 + 의미 있는 기본값
  let category='신흥 & 트렌드', platforms=['공통'], related=[];
  let eng = q, kor = q;

  if(/aws|s3|redshift|glue|sagemaker|bedrock|kinesis|athena|greengrass/.test(ql)){
    category='클라우드 & 인프라'; platforms=['AWS']; related=['AWS','클라우드'];
  } else if(/gcp|bigquery|vertex|dataflow|looker|dataplex/.test(ql)){
    category='클라우드 & 인프라'; platforms=['GCP']; related=['GCP','클라우드'];
  } else if(/snowflake|snowpark|cortex/.test(ql)){
    category='클라우드 & 인프라'; platforms=['Snowflake']; related=['Snowflake'];
  } else if(/databricks|delta|mlflow|unity catalog/.test(ql)){
    category='클라우드 & 인프라'; platforms=['Databricks']; related=['Databricks','Delta Lake'];
  } else if(/llm|gpt|claude|gemini|bert|nlp|자연어|언어모델/.test(ql)){
    category='AI / ML'; platforms=['AWS Bedrock','GCP Vertex AI']; related=['LLM','RAG','AI 에이전트'];
  } else if(/ml|머신러닝|machine learning|모델|딥러닝|neural|신경망/.test(ql)){
    category='AI / ML'; related=['MLOps','Feature Store'];
  } else if(/ai|인공지능|artificial intelligence|agent|에이전트/.test(ql)){
    category='AI / ML'; related=['LLM','MLOps'];
  } else if(/거버넌스|governance|catalog|lineage|rbac|품질|quality|마스킹/.test(ql)){
    category='데이터 거버넌스'; related=['데이터 거버넌스','데이터 카탈로그'];
  } else if(/etl|elt|파이프라인|pipeline|kafka|streaming|batch|airflow|dbt|cdc/.test(ql)){
    category='데이터 처리'; related=['데이터 파이프라인','ELT'];
  } else if(/lake|warehouse|mesh|fabric|mart|lakehouse|schema|스키마/.test(ql)){
    category='데이터 아키텍처'; related=['데이터 레이크','데이터 웨어하우스'];
  } else if(/ontology|온톨로지|rdf|owl|sparql|knowledge graph|그래프/.test(ql)){
    category='온톨로지 & 지식표현'; related=['온톨로지','지식 그래프'];
  } else if(/semantic|시맨틱|mdm|표준화|glossary|용어|메타/.test(ql)){
    category='시맨틱 & 데이터 표준'; related=['시맨틱 레이어','비즈니스 용어사전'];
  } else if(/mes|scada|iot|oee|예지|twin|공장|설비|제조|plc|historian/.test(ql)){
    category='제조 DX'; related=['MES','IIoT','예지보전'];
  }

  return {
    kor, eng, category,
    short: `${q}: 데이터 플랫폼 관련 기술 용어`,
    detail: `"${q}"은(는) ${category} 분야의 기술 개념입니다. AI 자동 정의를 위해 상단 PROXY_URL 설정 후 재시도하거나, 관리자 메뉴에서 직접 내용을 수정하세요.`,
    mfg_example: `${q}을(를) 활용한 철강·제조 현장 사례를 직접 입력해주세요.`,
    platforms, related
  };
}

function findDuplicates(kor, eng){
  const q=[kor.toLowerCase().replace(/\s/g,''), eng.toLowerCase().replace(/\s/g,'')];
  return DB.filter(t=>{
    const tk=t.kor.toLowerCase().replace(/\s/g,'');
    const te=t.eng.toLowerCase().replace(/\s/g,'');
    return q.includes(tk)||q.includes(te)||tk.includes(q[0])||q[0].includes(tk);
  });
}

async function saveAiTerm(){
  const body=document.getElementById('ai-body');
  const parsed=body._parsed; if(!parsed)return;
  const kor=(document.getElementById('ei-kor')?.value||parsed.kor||searchQuery).trim();
  const eng=(document.getElementById('ei-eng')?.value||parsed.eng||'').trim();
  const cat=(document.getElementById('ei-cat')?.value||parsed.category||'신흥 & 트렌드');
  const short=(document.getElementById('ei-short')?.value||parsed.short||'').trim();
  const detail=(document.getElementById('ei-detail')?.value||parsed.detail||'').trim();
  const mfg=(document.getElementById('ei-mfg')?.value||parsed.mfg_example||'').trim();
  const rel=(document.getElementById('ei-rel')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  if(!kor||!short){showToast('용어명과 한 줄 정의는 필수입니다');return;}
  const plts=[...document.querySelectorAll('.plt-chk:checked')].map(c=>c.value);

  const newTerm={
    id:'req-'+Date.now(),
    category:cat, kor, eng, short, detail,
    mfg_example:mfg, platforms:plts, related:rel,
    added_date:new Date().toISOString().slice(0,10),
    is_new:true,
    approved:'N'   // 관리자 승인 전
  };

  // GitHub에 저장 (approved:N)
  const ok = await pushTermToGithub(newTerm);
  if(ok){
    pendingAdds.push(newTerm);
    localStorage.setItem('pending_adds',JSON.stringify(pendingAdds));
    hideAiPanel(); clearSearch();
    showToast(`"${kor}" 등록 요청 완료 — 관리자 승인 후 표시됩니다`,'success');
    updatePendingBadge();
  } else {
    // GitHub 미설정 시 로컬 임시 저장
    pendingAdds.push(newTerm);
    localStorage.setItem('pending_adds',JSON.stringify(pendingAdds));
    hideAiPanel(); clearSearch();
    showToast(`"${kor}" 요청 저장됨 (GITHUB_TOKEN 설정 시 자동 반영)`,'success');
    updatePendingBadge();
  }
}

      <div class="form-group"><label class="form-label">한 줄 정의 *</label><input class="form-input" id="f-short" placeholder="30자 이내로 핵심 개념 요약"></div>
      <div class="form-group"><label class="form-label">상세 설명</label><textarea class="form-textarea" id="f-detail" placeholder="기술적 설명"></textarea></div>
      <div class="form-group"><label class="form-label">제조 DX 활용 예시</label><textarea class="form-textarea" id="f-mfg" placeholder="철강/제조 현장 사례"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">플랫폼 (쉼표 구분)</label><input class="form-input" id="f-plt" placeholder="AWS, GCP, Snowflake"></div>
        <div class="form-group"><label class="form-label">관련 용어 (쉼표 구분)</label><input class="form-input" id="f-rel" placeholder="데이터 레이크, ETL"></div>
      </div>
      <div class="admin-btns"><button class="btn-secondary" onclick="closeAdmin()">취소</button><button class="btn-primary" onclick="adminAdd()">✚ 즉시 추가</button></div>`;

  // ── 삭제 요청 탭 ──
  } else if(adminTab==='del'){
    el.innerHTML=`
      <div style="font-size:13px;color:var(--text3);margin-bottom:12px">전체 용어 ${DB.length}개 | 삭제 요청은 승인 후 db.json에 반영됩니다</div>
      <input class="form-input del-search" id="del-search" placeholder="용어명으로 검색..." oninput="filterDelList(this.value)">
      <div class="del-list" id="del-list">
        ${DB.map(t=>`
          <div class="del-item" id="delrow-${t.id}">
            <div class="del-item-info">
              <div class="del-item-kor">${t.kor} <span style="font-weight:400;font-size:12px;color:var(--text3)">${t.eng}</span></div>
              <div class="del-item-cat">${t.category}</div>
            </div>
            <button class="del-btn" onclick="requestDelete('${t.id}')">삭제 요청</button>
          </div>`).join('')}
      </div>`;

  // ── 내보내기 탭 ──
  } else {
    el.innerHTML=`
      <div style="font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.7">
        ${GITHUB_TOKEN?'승인된 변경사항은 자동으로 db.json에 반영됩니다.<br>수동 내보내기도 가능합니다.':'GITHUB_TOKEN 설정 시 승인 즉시 자동 반영됩니다.'}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-primary" onclick="exportDB()">📥 JSON 내보내기</button>
        <button class="btn-secondary" onclick="exportCSV()">📊 CSV 내보내기</button>
      </div>
      <div style="margin-top:16px;font-size:13px;color:var(--text3)">현재 DB: ${DB.length}개 | 승인 대기: ${pendingAdds.length}개 | 삭제 대기: ${pendingDels.length}개</div>`;
  }
}
function filterDelList(q){
  document.querySelectorAll('.del-item').forEach(r=>{
    r.style.display=r.querySelector('.del-item-kor').textContent.toLowerCase().includes(q.toLowerCase())?'flex':'none';
  });
}

// ── 삭제 요청 ──
function requestDelete(id){
  const term=DB.find(t=>t.id===id); if(!term)return;
  if(pendingDels.find(t=>t.id===id)){showToast('이미 삭제 요청된 용어입니다');return;}
  if(!confirm(`"${term.kor}" 용어 삭제를 요청하시겠습니까?\n관리자 승인 후 삭제됩니다.`))return;
  pendingDels.push({...term, reason:'사용자 삭제 요청', requested_date:new Date().toISOString().slice(0,10)});
  localStorage.setItem('pending_dels',JSON.stringify(pendingDels));
  showToast(`"${term.kor}" 삭제 요청 완료 — 관리자 승인 후 반영됩니다`);
  updatePendingBadge();
  const row=document.getElementById('delrow-'+id);
  if(row)row.querySelector('.del-btn').textContent='요청됨', row.querySelector('.del-btn').disabled=true;
}

// ── 승인: 등록 (approved: N → Y 변경) ──
async function approveAdd(idx){
  const t={...pendingAdds[idx]};
  delete t.status;
  t.approved='Y';
  t.is_new=true;
  t.approved_date=new Date().toISOString().slice(0,10);
  // DB에 추가 (화면 표시)
  DB.push(t);
  // GitHub db.json에서 해당 id 항목 approved:Y로 변경
  const ok=await updateApprovalInGithub(t.id,'Y');
  pendingAdds.splice(idx,1);
  localStorage.setItem('pending_adds',JSON.stringify(pendingAdds));
  buildFuse(); buildCatList(); renderAll();
  showToast(`"${t.kor}" 승인 완료${ok?' — db.json 반영됨':''}`, 'success');
  updatePendingBadge();
  renderAdminContent();
}

// ── 거부: 등록 ──
function rejectAdd(idx){
  const t=pendingAdds[idx];
  if(!confirm(`"${t.kor}" 등록 요청을 거부하시겠습니까?`))return;
  pendingAdds.splice(idx,1);
  localStorage.setItem('pending_adds',JSON.stringify(pendingAdds));
  updatePendingBadge();
  showToast(`"${t.kor}" 요청 거부됨`);
  renderAdminContent();
}

// ── 승인: 삭제 (db.json에서 해당 항목 제거) ──
async function approveDel(idx){
  const t=pendingDels[idx];
  DB=DB.filter(d=>d.id!==t.id);
  const ok=await deleteTermFromGithub(t.id);
  pendingDels.splice(idx,1);
  localStorage.setItem('pending_dels',JSON.stringify(pendingDels));
  buildFuse(); buildCatList(); renderAll();
  showToast(`"${t.kor}" 삭제 승인 완료${ok?' — db.json 반영됨':''}`, 'success');
  updatePendingBadge();
  renderAdminContent();
}

// ── 거부: 삭제 ──
function rejectDel(idx){
  const t=pendingDels[idx];
  if(!confirm(`"${t.kor}" 삭제 요청을 거부하시겠습니까?`))return;
  pendingDels.splice(idx,1);
  localStorage.setItem('pending_dels',JSON.stringify(pendingDels));
  updatePendingBadge();
  showToast(`"${t.kor}" 삭제 요청 거부됨`);
  renderAdminContent();
}

// ── GitHub: approved 값 변경 (N→Y) ──
async function updateApprovalInGithub(id, approvedVal){
  if(!GITHUB_TOKEN||!GITHUB_REPO) return false;
  try{
    const apiBase=`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const getRes=await fetch(apiBase,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getRes.ok) return false;
    const getJson=await getRes.json();
    const sha=getJson.sha;
    const current=JSON.parse(decodeURIComponent(escape(atob(getJson.content.replace(/
/g,'')))));
    const term=current.terms.find(t=>t.id===id);
    if(!term) return false;
    term.approved=approvedVal;
    term.approved_date=new Date().toISOString().slice(0,10);
    const newContent=JSON.stringify(current,null,2);
    const encoded=btoa(unescape(encodeURIComponent(newContent)));
    const putRes=await fetch(apiBase,{
      method:'PUT',
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`용어 승인: ${term.kor}`,content:encoded,sha})
    });
    return putRes.ok;
  }catch(e){console.error('updateApprovalInGithub failed:',e);return false;}
}

// ── GitHub: 용어 삭제 ──
async function deleteTermFromGithub(id){
  if(!GITHUB_TOKEN||!GITHUB_REPO) return false;
  try{
    const apiBase=`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const getRes=await fetch(apiBase,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getRes.ok) return false;
    const getJson=await getRes.json();
    const sha=getJson.sha;
    const current=JSON.parse(decodeURIComponent(escape(atob(getJson.content.replace(/
/g,'')))));
    const term=current.terms.find(t=>t.id===id);
    current.terms=current.terms.filter(t=>t.id!==id);
    current.total=current.terms.length;
    const newContent=JSON.stringify(current,null,2);
    const encoded=btoa(unescape(encodeURIComponent(newContent)));
    const putRes=await fetch(apiBase,{
      method:'PUT',
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`용어 삭제 승인: ${term?term.kor:id}`,content:encoded,sha})
    });
    return putRes.ok;
  }catch(e){console.error('deleteTermFromGithub failed:',e);return false;}
}

// ── GitHub: 단일 용어 추가 (approved:N으로 push) ──
async function pushTermToGithub(term){
  if(!GITHUB_TOKEN||!GITHUB_REPO) return false;
  try{
    const apiBase=`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const getRes=await fetch(apiBase,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getRes.ok) return false;
    const getJson=await getRes.json();
    const sha=getJson.sha;
    const current=JSON.parse(decodeURIComponent(escape(atob(getJson.content.replace(/
/g,'')))));
    current.terms.push(term);
    current.total=current.terms.length;
    const newContent=JSON.stringify(current,null,2);
    const encoded=btoa(unescape(encodeURIComponent(newContent)));
    const putRes=await fetch(apiBase,{
      method:'PUT',
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`용어 등록 요청: ${term.kor} (승인 대기)`,content:encoded,sha})
    });
    return putRes.ok;
  }catch(e){console.error('pushTermToGithub failed:',e);return false;}
}

// ── GitHub API: db.json 전체 업데이트 ──
async function updateGithubDB(){
  if(!GITHUB_TOKEN||!GITHUB_REPO) return false;
  try{
    const apiBase=`https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    // 현재 파일 SHA 가져오기
    const getRes=await fetch(apiBase,{headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json'}});
    if(!getRes.ok) throw new Error('GET failed');
    const getJson=await getRes.json();
    const sha=getJson.sha;
    // 새 내용 업로드
    const newContent=JSON.stringify({terms:DB,version:'2.0',total:DB.length},null,2);
    const encoded=btoa(unescape(encodeURIComponent(newContent)));
    const putRes=await fetch(apiBase,{
      method:'PUT',
      headers:{'Authorization':`token ${GITHUB_TOKEN}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
      body:JSON.stringify({message:`용어사전 업데이트 (${new Date().toLocaleDateString('ko-KR')})`,content:encoded,sha})
    });
    return putRes.ok;
  }catch(e){console.error('GitHub update failed:',e);return false;}
}

// ── 관리자 직접 추가 (즉시 반영) ──
async function adminAdd(){
  const kor=document.getElementById('f-kor').value.trim();
  const eng=document.getElementById('f-eng').value.trim();
  const short=document.getElementById('f-short').value.trim();
  if(!kor||!eng||!short){showToast('필수 항목을 입력해주세요');return;}
  const dups=findDuplicates(kor,eng);
  if(dups.length&&!confirm(`유사한 용어 "${dups[0].kor}"이(가) 있습니다. 그래도 추가하시겠습니까?`))return;
  const t={
    id:kor.toLowerCase().replace(/[\s\W]+/g,'-')+'-'+Date.now(),
    category:document.getElementById('f-cat').value, kor, eng, short,
    detail:document.getElementById('f-detail').value.trim(),
    mfg_example:document.getElementById('f-mfg').value.trim(),
    platforms:document.getElementById('f-plt').value.split(',').map(s=>s.trim()).filter(Boolean),
    related:document.getElementById('f-rel').value.split(',').map(s=>s.trim()).filter(Boolean),
    added_date:new Date().toISOString().slice(0,10), is_new:true
  };
  t.approved='Y';
  DB.push(t);
  const ok=await pushTermToGithub(t);
  buildFuse(); buildCatList(); renderAll(); closeAdmin();
  showToast(`"${kor}" 추가 완료${ok?' — db.json 반영됨':''}!`,'success');
}
function exportDB(){
  const blob=new Blob([JSON.stringify({terms:DB,version:'2.0',total:DB.length},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='db.json';a.click();
  showToast('JSON 내보내기 완료');
}
function exportCSV(){
  const data=filtered.length?filtered:DB;
  const headers=['분류','용어(한글)','용어(영문)','한 줄 정의','상세 설명','제조DX 활용 예시','플랫폼','관련 용어','추가일'];
  const rows=data.map(t=>[t.category,t.kor,t.eng,t.short,t.detail,t.mfg_example||'',(t.platforms||[]).join('/'),(t.related||[]).join('/'),t.added_date||''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv='\uFEFF'+[headers.join(','),...rows].join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`용어사전_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  showToast('CSV 내보내기 완료');
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast'+(type?' '+type:'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value;
  document.getElementById('search-clear').classList.toggle('show',!!searchQuery);
  hideAiPanel(); renderAll();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeAdmin();}
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('search-input').focus();}
});
window.addEventListener('load',()=>{const h=location.hash.slice(1);if(h)setTimeout(()=>openModal(h),400);});
init();
</script>
